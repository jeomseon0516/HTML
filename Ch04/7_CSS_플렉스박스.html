<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>7_CSS_플렉스박스</title>
        <style>
            section {
                width: 800px;
                height: 400px;
                border: 1px solid black;
                box-sizing: border-box;
                margin-bottom: 10px;
            }

            section > div {
                width: 100px;
                height: 100px;
                border: 1px solid blue;
                box-sizing: border-box;
                background: orange;
            }

            #container1 {
                display: flex;
                flex-direction: row;
                justify-content: center;
                align-items: center;
            }

            #container2 {
                display: flex;
                flex-direction: row;
                justify-content: space-around;
                align-items: center;
            }

            #container3 {
                display: flex;
            }

            #container3 > div {
                width: 100%;
                height: 100%;
            }
        </style>
    </head>
    <body>
        <h3>7.CSS 플렉스 박스 속성</h3>
        <section id="container1">
            <div>1</div>
            <div>2</div>
            <div>3</div>
            <div>4</div>
            <div>5</div>
        </section>

        <section id="container2">
            <div>1</div>
            <div>2</div>
            <div>3</div>
        </section>

        <section id="container3">
            <div>1</div>
            <div>2</div>
            <div>3</div>
            <div>4</div>
            <div>5</div>
            <div>6</div>
            <div>7</div>
        </section>
    </body>
</html>
