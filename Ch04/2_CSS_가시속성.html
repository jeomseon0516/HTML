<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>2_CSS_가시속성</title>
        <style>
            div > span {
                background: orange;
            }

            div > div { 
                background: green;
            }

            /* display 속성 */
            .box1 > span:nth-child(1) {
                display: none;
            }

            .box1 > span:nth-child(2) {
                visibility: hidden;
            }

            .box2 > span:nth-child(2) {
                display: block; /* 태그 형식을 block으로 변환 */
                width: 100px;
                height: 100px;
                border: 1px solid black;
            }

            .box3 > div:nth-child(2) {
                display: inline; /* 태그 형식을 inline으로 변환 */
                width: 100px;
                height: 100px;
            }

            .box4 > div {
                display: inline-block;
                width: 100px;
                height: 100px;
            }

            /* overflow */
            .box5 {
                display: inline-block;
                width: 200px;
                height: 200px;
                border: 1px solid black;
                box-sizing: border-box;
            }

            .box5 > div {
                width: 100px;
                height: 300px;
                border: 1px solid black;
                box-sizing: border-box;
            }

            .box5-1 {
                overflow: visible;
            }

            .box5-1 > div {
                opacity: 0;
            }

            .box5-2 {
                overflow: scroll;
            }

            .box5-2 > div { 
                opacity: 0.5;
            }

            .box5-3 {
                overflow: hidden;
            }

            .box5-3 > div {
                opacity: 1;
            }

        </style>
    </head>
    <body>
        <h3>2. CSS 가시 속성</h3>

        <h4>display: none</h4>
        <div class="box1">
            <span>SPAN1</span>
            <span>SPAN2</span>
            <span>SPAN3</span>
        </div>
        <h4>display: block</h4>
        <div class="box2">
            <span>SPAN1</span>
            <span>SPAN2</span>
            <span>SPAN3</span>
        </div>
        <h4>display: inline</h4>
        <div class="box3">
            <span>SPAN1</span>
            <div>DIV2</div>
            <span>SPAN3</span>
        </div>
        <h4>display: inline-block</h4>
        <div class="box4">
            <span>SPAN1</span>
            <div>DIV2</div>
            <span>SPAN3</span>
        </div>
        <h4>display: overflow</h4>
        <div class="box5 box5-1">
            <div>1</div>
        </div>
        <div class="box5 box5-2">
            <div>2</div>
        </div>
        <div class="box5 box5-3">
            <div>3</div>
        </div>
        <h4>display: none</h4>
        <div class="box1">
            <span>SPAN1</span>
            <span>SPAN2</span>
            <span>SPAN3</span>
        </div>
    </body>
</html>
