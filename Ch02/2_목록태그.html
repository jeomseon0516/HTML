<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8"/><!-- 한글 문자셋 설정 -->
        <title>2_목록태그</title>
    </head>
    <body>
        <h3>2.목록태그</h3>

        <h4>순서 없는 목록</h4>
        <ul><!-- unorder list -->
            <li>서울</li><!-- list -->
            <li>대전</li>
            <li>대구</li>
            <li>부산</li>
            <li>광주</li>
        </ul>
        <h4>순서 있는 목록</h4>
        <ol><!-- order list -->
            <li>한국</li>
            <li>미국</li>
            <li>일본</li>
            <li>중국</li>
            <li>호주</li>
        </ol>
    </body>
</html>
