<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>5_layout</title>
        <style>
            /* 초기화 */
        * {
            margin: 0;
            padding: 0;
            font: normal 12px '돋움';
        }

        ul, ol { list-style: none; }
        a { text-decoration: none; color: #111; }
        input, textarea { outline: none; }
        
        /* container */
        #container {
            width: 800px;
            height: auto;
            background: #fff;
            border: 1px solid black;
            box-sizing: border-box;
        }

        /* 헤더 */
        header {
            width: 100%;
            height: 120px;
            background: #eee;
            border: dashed black;
            box-sizing: border-box;
        }

        /* 메인 */
        main {
            width: 100%;
            height: 400px;
            padding: 10px;
            margin: 10px 0;
            background: #ddd;
            border: dashed black;
            box-sizing: border-box;
        }

        main > aside {
            float: left;
            width: 216px;
            height: 400px;
            border: 1px dashed #ccc;
            box-sizing: border-box;
        }

        main > section {
            float: left;
            width: 530px;
            height: 400px;
            margin-left: 10px;
            background-color: #ccc;
            border: 1px dashed black;
            box-sizing: border-box;
        }

        main > section {

        }
        /* 푸터 */
        footer {
            width: 100%;
            height: 100px;
            background: #ccc;
            border: dashed black;
            box-sizing: border-box;
        }
        </style>
    </head>
    <body>
        <div id="container">
            <header>header</header>
                <section>section</section>
            <main>main</main>
            <footer>footer</footer>
        </div>
    </body>
</html>
