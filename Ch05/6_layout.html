<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Layout #6</title>
    </head>
    <style>
        /* 초기화 */
        * {
            margin: 0;
            padding: 10px;
            font: normal 12px '돋움';
        }

        ul, ol { list-style: none; }
        a { text-decoration: none; color: #111; }
        input, textarea { outline: none; }
        
        /* container */
        #container {
            width: 800px;
            height: auto;
            padding: 10px;
            background: #fff;
            border: 1px solid black;
            box-sizing: border-box;
            margin: 0 auto;
        }

        /* 헤더 */
        header {
            width: 100%;
            height: 120px;
            background: #eee;
            border: 1px dashed black;
            box-sizing: border-box;
        }

        /* 메인 */
        main {
            width: 100%;
            min-height: 400px;
            margin: 10px 0;
            padding: 0 10px 10px 0;
            background: #eee;
            border: 1px dashed black;
            box-sizing: border-box;
            overflow: hidden;
        }

        main > aside {
            float: left;
            width: 216px;
            height: 400px;
            margin-left: 10px;
            background: #ddd;
            border: 1px dashed black;
            box-sizing: border-box;
        }

        main > section {
            float: left;
            display: flex;
            flex-direction: column;
            width: 530px;
            height: 400px;
            margin-left: 10px;
            background: #ddd;
            border: 1px dashed black;
            box-sizing: border-box;
        }

        main > section > * {
            width: 100%;
            flex: 1;
            margin-top: 10px;
            min-height: 168px;
            background: #ccc;
            border: 1px dashed black;
            box-sizing: border-box;
        }

        /* 푸터 */
        footer {
            flex: 1;
            width: 100%;
            height: 100px;
            background: #eee;
            border: 1px dashed black;
            box-sizing: border-box;
        }
    </style>
    <body>
        <div id="container">
            <header>header</header>
            <main>
                <p>main</p>
                <aside>aside</aside>
                <section>
                    section
                    <article>article #1</article>
                    <article>article #2</article>
                </section>
            </main>
            <footer>footer</footer>
        </div>
    </body>
</html>
