<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Layout #7</title>
</head>
<style>
    /* 초기화 */
    * {
        margin: 0;
        padding: 10px;
        font: normal 12px '돋움';
    }

    ul, ol { list-style: none; }
    a { text-decoration: none; color: #111; }
    input, textarea { outline: none; }

    /* container */
    #container {
        width: 860px;
        height: auto;
        padding: 10px;
        background: #fff;
        border: 1px solid black;
        box-sizing: border-box;
        margin: 0 auto;
    }

    /* 헤더 */
    header {
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        width: 100%;
        height: 120px;
        background: #eee;
        border: 1px dashed black;
        box-sizing: border-box;
    }

    /* nav */
    nav {
        width: 100%;
        height: 50px;
        background: #ddd;
        border: 1px dashed black;
        box-sizing: border-box;
    }

    /* 메인 */
    main {
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        width: 100%;
        min-height: 400px;
        margin: 10px 0;
        background: #eee;
        border: 1px dashed black;
        box-sizing: border-box;
        overflow: hidden;
    }

    main > nav {
        margin-top: 10px;
    }

    .flexbox {
        display: flex;
        flex-direction: row;
        padding: 10px 0 0 0;
        justify-content: space-between;
    }

    .flexbox > aside {
        width: 198px;
        height: 400px;
        background: #ddd;
        border: 1px dashed black;
        box-sizing: border-box;
    }

    .flexbox > section {
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        width: 400px;
        height: 400px;
        padding-bottom: 10px;
        background: #ddd;
        border: 1px dashed black;
        box-sizing: border-box;
    }

    .flexbox > section > * {
        flex: 1;
        margin-top: 10px;
    }

    .flexbox > section > article {
        width: 100%;
        height: 168px;
        background: #ccc;
        border: 1px dashed black;
        box-sizing: border-box;
    }

    /* 푸터 */
    footer {
        width: 100%;
        height: 100px;
        background: #eee;
        border: 1px dashed black;
        box-sizing: border-box;
    }
</style>

<body>
    <div id="container">
        <header> 
            header 
            <nav>nav</nav>
        </header>
        <main> 
            main 
            <nav>nav</nav>
            <div class="flexbox">
                <aside>aside #1</aside>
                <section> section 
                    <article>article #1</article>
                    <article>article #2</article>
                </section>
                <aside>aside #2</aside>
            </div>
        </main>
        <footer>footer</footer>
    </div>
</body>

</html>
